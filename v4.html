<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wither Report</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* scanline effect */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15),
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .screen {
    background: #0d0d1a;
    border: 4px solid #00ffff;
    box-shadow:
      0 0 20px #00ffff,
      0 0 40px rgba(0, 255, 255, 0.3),
      inset 0 0 20px rgba(0, 255, 255, 0.05);
    width: 100%;
    max-width: 460px;
    padding: 0;
    image-rendering: pixelated;
    position: relative;
  }

  .screen-header {
    background: #00ffff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .screen-header h1 {
    font-size: 9px;
    color: #0d0d1a;
    letter-spacing: 1px;
    line-height: 1.4;
  }

  .screen-dots {
    display: flex;
    gap: 5px;
  }

  .dot {
    width: 10px;
    height: 10px;
    background: #1a1a2e;
  }

  .screen-body {
    padding: 20px 16px;
  }

  .sys-line {
    font-size: 8px;
    color: #00ff41;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .sys-line .blink {
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .divider-px {
    border: none;
    border-top: 2px solid #333;
    margin: 14px 0;
  }

  .divider-px.cyan { border-color: #00ffff44; }

  .label-text {
    font-size: 7px;
    color: #888;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .emoji-box {
    border: 4px solid #00ffff;
    background: #0a0a18;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 4.5rem;
    image-rendering: pixelated;
    box-shadow:
      4px 4px 0 #005555,
      0 0 20px rgba(0, 255, 255, 0.2);
    animation: glow-pulse 2s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 4px 4px 0 #005555, 0 0 10px rgba(0,255,255,0.2); }
    50% { box-shadow: 4px 4px 0 #005555, 0 0 30px rgba(0,255,255,0.5); }
  }

  .condition-block {
    text-align: center;
    margin-bottom: 14px;
  }

  .condition-text {
    font-size: 13px;
    letter-spacing: 2px;
    display: inline-block;
    padding: 8px 12px;
    background: #111120;
    border: 2px solid var(--cc, #00ffff);
    color: var(--cc, #00ffff);
    box-shadow: 3px 3px 0 var(--cc, #00ffff);
    text-shadow: 0 0 8px var(--cc, #00ffff);
    line-height: 1.4;
  }

  .level-text {
    font-size: 8px;
    color: #ff00ff;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  /* pixel health bar */
  .hp-label {
    font-size: 7px;
    color: #888;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .hp-bar-container {
    border: 2px solid #444;
    background: #111;
    height: 20px;
    position: relative;
    margin-bottom: 8px;
  }

  .hp-bar-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      var(--hpcolor, #00ff41) 0px,
      var(--hpcolor, #00ff41) 16px,
      transparent 16px,
      transparent 20px
    );
    transition: width 0.5s steps(10);
    box-shadow: 0 0 8px var(--hpcolor, #00ff41);
  }

  .hp-blocks {
    display: flex;
    gap: 3px;
    margin-bottom: 16px;
  }

  .hp-block {
    width: calc(10% - 3px);
    height: 18px;
    border: 2px solid #333;
    background: #111;
  }

  .hp-block.filled {
    background: var(--hbc, #00ff41);
    box-shadow: 0 0 4px var(--hbc, #00ff41);
    border-color: var(--hbc, #00ff41);
  }

  .hp-block.current {
    border-color: #fff;
    animation: block-pulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes block-pulse {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }

  .note-box {
    background: #111120;
    border: 2px solid #333355;
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  .note-label {
    font-size: 7px;
    color: #ff00ff;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-shadow: 0 0 6px #ff00ff;
  }

  .note-text {
    font-size: 8px;
    color: #aaaacc;
    line-height: 1.8;
    word-break: break-word;
  }

  .updated-line {
    font-size: 7px;
    color: #555577;
    text-align: right;
    letter-spacing: 1px;
  }

  .tag {
    color: #00ffff;
    text-shadow: 0 0 4px #00ffff;
  }

  .fallback {
    text-align: center;
    color: #00ff41;
    font-size: 8px;
    padding: 30px;
    line-height: 2;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="screen-header">
    <h1>WITHER RPG<br>v2.6.0</h1>
    <div class="screen-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="screen-body">
    <div class="sys-line">&gt; LOADING PLAYER DATA<span class="blink">_</span></div>
    <div class="sys-line">&gt; TARGET: AZMYTH</div>
    <div class="divider-px"></div>
    <div id="content">
      <div class="fallback">CONNECTING...<br>PLEASE WAIT<span class="blink">_</span></div>
    </div>
  </div>
</div>

<script>
const STATES = [
  { label: 'Stormy',        emoji: '⛈️',  color: '#6060a0' },
  { label: 'Heavy Rain',    emoji: '🌧️', color: '#5a80a0' },
  { label: 'Rainy',         emoji: '🌦️', color: '#6090b0' },
  { label: 'Overcast',      emoji: '🌥️', color: '#8899b0' },
  { label: 'Cloudy',        emoji: '☁️',  color: '#99aabb' },
  { label: 'Partly Cloudy', emoji: '🌤️', color: '#70b0d0' },
  { label: 'Clearing Up',   emoji: '🌈',  color: '#80c080' },
  { label: 'Sunny',         emoji: '☀️',  color: '#f0c040' },
  { label: 'Beautiful',     emoji: '🌟',  color: '#f0a030' },
  { label: 'Perfect',       emoji: '✨',  color: '#ff80c0' },
];

fetch('mood.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const level = Math.max(1, Math.min(10, data.level || 6));
    const s = STATES[level - 1];
    const pct = (level / 10 * 100).toFixed(0);

    let blocksHTML = '';
    for (let i = 1; i <= 10; i++) {
      let cls = 'hp-block';
      let style = '';
      if (i <= level) {
        cls += ' filled';
        style = `--hbc: ${s.color};`;
      }
      if (i === level) cls += ' current';
      blocksHTML += `<div class="${cls}" style="${style}"></div>`;
    }

    const noteHTML = data.note
      ? `<div class="note-label">&gt; NOTE LOG:</div><div class="note-text">"${data.note}"</div>`
      : `<div class="note-text" style="color:#444466;">[NO NOTE RECORDED]</div>`;

    document.getElementById('content').innerHTML = `
      <div class="label-text">STATUS / MOOD READING</div>
      <div class="emoji-box">${s.emoji}</div>
      <div class="condition-block">
        <div class="condition-text" style="--cc: ${s.color};">${s.label.toUpperCase()}</div>
      </div>
      <div class="level-text">WEATHER LVL: ${level} / 10 &nbsp; [${pct}%]</div>
      <div class="hp-label">&gt; WEATHER METER:</div>
      <div class="hp-blocks">${blocksHTML}</div>
      <div class="divider-px cyan"></div>
      <div class="note-box">${noteHTML}</div>
      <div class="updated-line"><span class="tag">&gt;</span> UPDATED: ${(data.updated || '?').toUpperCase()}</div>
    `;
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div class="fallback">ERR: 404<br>DATA NOT FOUND<span class="blink">_</span></div>';
  });
</script>
</body>
</html>
