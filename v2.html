<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wither Report ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: #fff0f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Scattered sparkle decorations */
    body::before {
      content: '✦ ✧ ✩ ✦ ✧ ✩ ✦ ✧ ✩ ✦ ✧ ✩ ✦ ✧';
      position: fixed;
      top: 0; left: 0; right: 0;
      font-size: 1rem;
      color: rgba(255, 170, 210, 0.3);
      word-spacing: 2rem;
      letter-spacing: 0.5rem;
      line-height: 3.5rem;
      padding: 1rem;
      pointer-events: none;
      white-space: pre-wrap;
      overflow: hidden;
      height: 100%;
    }

    /* Floating bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.18;
      animation: bobble 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bubble:nth-child(1) { width: 120px; height: 120px; background: #ffb3d9; top: 8%;  left: 5%;  animation-delay: 0s;    animation-duration: 9s; }
    .bubble:nth-child(2) { width:  80px; height:  80px; background: #c9b3ff; top: 15%; right: 8%; animation-delay: 2s;    animation-duration: 11s; }
    .bubble:nth-child(3) { width: 100px; height: 100px; background: #b3f0e8; bottom: 20%; left: 10%; animation-delay: 1s; animation-duration: 10s; }
    .bubble:nth-child(4) { width:  60px; height:  60px; background: #ffe0b3; bottom: 10%; right: 5%; animation-delay: 3s; animation-duration: 8s; }
    .bubble:nth-child(5) { width:  50px; height:  50px; background: #ffb3d9; top: 50%;  left: 2%;  animation-delay: 1.5s; animation-duration: 12s; }
    .bubble:nth-child(6) { width:  70px; height:  70px; background: #c9b3ff; top: 60%;  right: 3%; animation-delay: 0.5s; animation-duration: 9.5s; }

    @keyframes bobble {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-20px) scale(1.05); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border-radius: 36px;
      padding: 2.8rem 2.5rem 2.4rem;
      max-width: 400px;
      width: 100%;
      box-shadow:
        0 8px 40px rgba(255, 150, 200, 0.22),
        0 2px 12px rgba(255, 150, 200, 0.12),
        0 0 0 3px rgba(255, 192, 220, 0.35);
      text-align: center;
      transition: box-shadow 0.6s ease;
    }

    /* Title row at top */
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8a0c0;
      margin-bottom: 1.8rem;
    }

    /* Emoji circle */
    .emoji-circle-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.4rem;
    }

    .emoji-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid #ffb3d9;
      background: linear-gradient(135deg, #fff5fa, #fce4f3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      transition: border-color 0.6s ease, background 0.6s ease;
      box-shadow:
        0 4px 20px rgba(255, 150, 200, 0.25),
        inset 0 2px 6px rgba(255,255,255,0.8);
      animation: wiggle 4s ease-in-out infinite;
      position: relative;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      25%       { transform: rotate(3deg) scale(1.03); }
      50%       { transform: rotate(-2deg) scale(1.06); }
      75%       { transform: rotate(2deg) scale(1.03); }
    }

    /* Ring around emoji */
    .emoji-circle::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 3px dashed rgba(255, 170, 210, 0.45);
      animation: spin 12s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* "azmyth is feeling~" */
    .feeling-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f0a0c8;
      margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }

    /* Condition name */
    .condition-name {
      font-size: 2rem;
      font-weight: 900;
      color: #d966a0;
      margin-bottom: 0.6rem;
      letter-spacing: -0.01em;
      transition: color 0.5s ease;
    }

    /* Little face */
    .kawaii-face {
      font-size: 1.05rem;
      color: #e8a0c0;
      margin-bottom: 1.6rem;
      letter-spacing: 0.1em;
    }

    /* Heart scale */
    .hearts-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 1.6rem;
    }

    .heart {
      font-size: 1.15rem;
      transition: all 0.3s ease;
      line-height: 1;
    }

    .heart.filled {
      color: #ff80b5;
      filter: drop-shadow(0 1px 4px rgba(255, 100, 160, 0.4));
      transform: scale(1.1);
    }

    .heart.empty {
      color: #e0c8d8;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.4rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #ffd6ec, transparent);
      border-radius: 2px;
    }
    .divider-stars {
      font-size: 0.7rem;
      color: #f0a0c8;
      letter-spacing: 4px;
    }

    /* Note */
    .note-text {
      font-size: 0.88rem;
      font-weight: 600;
      font-style: italic;
      color: #b088a0;
      line-height: 1.65;
      margin-bottom: 1.8rem;
      min-height: 1.2rem;
    }

    /* Footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-heart {
      font-size: 0.65rem;
      color: #f0a0c8;
    }

    .updated-row {
      font-size: 0.68rem;
      font-weight: 600;
      color: #cca8ba;
      letter-spacing: 0.04em;
    }

    /* Mood color variants */
    .mood-1, .mood-2 { --accent: #9b8fc4; --ring: #c3b6e8; --bg: #f5f0fc; }
    .mood-3, .mood-4 { --accent: #7aacd4; --ring: #b3d4f0; --bg: #f0f6fc; }
    .mood-5, .mood-6 { --accent: #8abfb8; --ring: #b3e0d8; --bg: #f0f9f7; }
    .mood-7          { --accent: #6dbfa0; --ring: #b3e8d0; --bg: #f0fcf6; }
    .mood-8, .mood-9 { --accent: #e0a040; --ring: #f0cc88; --bg: #fdf8f0; }
    .mood-10         { --accent: #e06090; --ring: #f0a8c8; --bg: #fdf0f6; }

    .card.has-mood .emoji-circle   { border-color: var(--ring); background: linear-gradient(135deg, #fff, var(--bg)); }
    .card.has-mood .condition-name { color: var(--accent); }
    .card.has-mood                 { box-shadow: 0 8px 40px color-mix(in srgb, var(--accent) 25%, transparent), 0 2px 12px color-mix(in srgb, var(--accent) 12%, transparent), 0 0 0 3px color-mix(in srgb, var(--ring) 40%, transparent); }
  </style>
</head>
<body>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="card" id="card">
    <div class="card-title">✦ The Wither Report ✦</div>

    <div class="emoji-circle-wrap">
      <div class="emoji-circle" id="mainEmoji">⛈️</div>
    </div>

    <div class="feeling-label">azmyth is feeling~ ♡</div>
    <div class="condition-name" id="conditionName">loading…</div>
    <div class="kawaii-face" id="kawaiiface">(´• ω •`)</div>

    <div class="hearts-row" id="heartsRow"></div>

    <div class="divider">
      <span class="divider-stars">✦ ✧ ✦</span>
    </div>

    <div class="note-text" id="noteText"></div>

    <div class="card-footer">
      <span class="footer-heart">♡</span>
      <span class="updated-row" id="updatedRow">loading…</span>
      <span class="footer-heart">♡</span>
    </div>
  </div>

  <script>
    const STATES = [
      { label: 'Stormy',        emoji: '⛈️',  face: '(っ˘̩╭╮˘̩)っ', mood: 1  },
      { label: 'Heavy Rain',    emoji: '🌧️',  face: '(｡•́︿•̀｡)',    mood: 2  },
      { label: 'Rainy',         emoji: '🌦️',  face: '(´-ω-`)',       mood: 3  },
      { label: 'Overcast',      emoji: '🌥️',  face: '(•᷄ω•᷅)',        mood: 4  },
      { label: 'Cloudy',        emoji: '☁️',   face: '(￣ω￣)',        mood: 5  },
      { label: 'Partly Cloudy', emoji: '🌤️',  face: '(´• ω •`)',     mood: 6  },
      { label: 'Clearing Up',   emoji: '🌈',   face: '(*´▽`*)',       mood: 7  },
      { label: 'Sunny',         emoji: '☀️',   face: '(◕‿◕✿)',       mood: 8  },
      { label: 'Beautiful',     emoji: '🌟',   face: '(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧', mood: 9  },
      { label: 'Perfect',       emoji: '✨',   face: '(*˘︶˘*).｡*♡',  mood: 10 },
    ];

    // Build hearts
    const heartsRow = document.getElementById('heartsRow');
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('span');
      h.className = 'heart empty';
      h.id = 'heart-' + i;
      h.textContent = '♥';
      heartsRow.appendChild(h);
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    fetch('mood.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const level = Math.max(1, Math.min(10, data.level || 6));
        const s = STATES[level - 1];

        document.getElementById('mainEmoji').textContent     = s.emoji;
        document.getElementById('conditionName').textContent = s.label;
        document.getElementById('kawaiiface').textContent    = s.face;

        for (let i = 0; i < 10; i++) {
          const h = document.getElementById('heart-' + i);
          h.className = 'heart ' + (i < level ? 'filled' : 'empty');
        }

        const noteEl = document.getElementById('noteText');
        noteEl.textContent = data.note ? '\u201c' + data.note + '\u201d' : '';

        const upd = document.getElementById('updatedRow');
        upd.textContent = data.updated ? formatDate(data.updated) : '';

        // Apply mood class
        const card = document.getElementById('card');
        card.className = 'card has-mood mood-' + level;
      })
      .catch(() => {
        document.getElementById('conditionName').textContent = '???';
        document.getElementById('updatedRow').textContent    = 'Could not load data';
      });
  </script>
</body>
</html>
