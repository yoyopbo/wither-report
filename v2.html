<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wither Report</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fredoka One', cursive;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff6eb4 0%, #ff9de2 50%, #ffb3ec 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  /* floating stars background */
  body::before {
    content: '⭐ ✨ ⭐ 💖 ✨ ⭐ 💕 ✨ ⭐ 💖 ✨ ⭐ 💕 ✨ ⭐ 💖';
    position: fixed;
    top: 0; left: 0; right: 0;
    font-size: 1.4rem;
    color: rgba(255,255,255,0.4);
    line-height: 2.2rem;
    letter-spacing: 12px;
    word-spacing: 8px;
    pointer-events: none;
    white-space: normal;
    width: 100%;
    padding: 10px;
    word-break: break-all;
  }

  .card {
    background: white;
    width: 100%;
    max-width: 460px;
    padding: 28px 24px;
    border-radius: 36px;
    box-shadow:
      0 8px 32px rgba(255, 80, 160, 0.3),
      0 0 0 4px #fff,
      0 0 0 8px #ff80cc;
    position: relative;
    z-index: 1;
  }

  .title-bubble {
    background: linear-gradient(135deg, #ff4da6, #ff80cc);
    border-radius: 50px;
    padding: 14px 20px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 6px 0 #cc2080, 0 8px 16px rgba(255, 60, 140, 0.3);
  }

  .title-bubble h1 {
    font-size: 1.8rem;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 #cc2080;
  }

  .sticker-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 1.4rem;
  }

  .feeling-pill {
    background: #fff0f8;
    border: 3px solid #ffaadd;
    border-radius: 50px;
    padding: 6px 18px;
    text-align: center;
    font-size: 1.3rem;
    color: #cc44aa;
    margin-bottom: 14px;
  }

  .emoji-bubble {
    background: linear-gradient(135deg, #fff0fa, #ffe0f4);
    border: 4px solid #ffaadd;
    border-radius: 50%;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 5rem;
    box-shadow:
      0 6px 0 #dd88cc,
      0 8px 20px rgba(255, 100, 180, 0.25);
    animation: wobble 2s ease-in-out infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    25% { transform: rotate(3deg) scale(1.06); }
    50% { transform: rotate(-2deg) scale(1.02); }
    75% { transform: rotate(4deg) scale(1.05); }
  }

  .condition-bubble {
    text-align: center;
    margin-bottom: 18px;
  }

  .condition-text {
    display: inline-block;
    font-size: 2.2rem;
    color: #fff;
    background: var(--ccolor, #ff80cc);
    padding: 8px 28px;
    border-radius: 50px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    letter-spacing: 1px;
  }

  .level-text {
    text-align: center;
    font-size: 1.1rem;
    color: #cc77aa;
    margin-bottom: 12px;
    margin-top: 6px;
  }

  .bubbles-scale {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .bub {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    background: #f0d0e8;
    box-shadow: 0 3px 0 rgba(0,0,0,0.1), inset 0 -2px 4px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }

  .bub.filled { background: var(--bc, #ff80cc); }
  .bub.current { transform: scale(1.35); border-color: #fff; box-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 0 10px rgba(255,80,180,0.4); }

  .divider {
    border: none;
    border-top: 3px dotted #ffbbdd;
    margin: 14px 0;
  }

  .note-pill {
    background: #fff5fc;
    border: 3px solid #ffccee;
    border-radius: 20px;
    padding: 12px 16px;
    margin-bottom: 12px;
    min-height: 52px;
  }

  .note-label {
    font-size: 0.9rem;
    color: #dd88bb;
    margin-bottom: 4px;
  }

  .note-text {
    font-size: 1.2rem;
    color: #cc44aa;
  }

  .updated-pill {
    background: #ff80cc;
    color: #fff;
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 1rem;
    text-align: center;
    display: inline-block;
    width: 100%;
    box-shadow: 0 3px 0 #cc4499;
  }

  .fallback {
    text-align: center;
    color: #cc77aa;
    font-size: 1.4rem;
    padding: 30px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="title-bubble">
    <h1>✨ THE WITHER REPORT ✨</h1>
  </div>

  <div id="content">
    <div class="fallback">loading... 💕</div>
  </div>
</div>

<script>
const STATES = [
  { label: 'Stormy',        emoji: '⛈️',  color: '#6060a0' },
  { label: 'Heavy Rain',    emoji: '🌧️', color: '#5a80a0' },
  { label: 'Rainy',         emoji: '🌦️', color: '#6090b0' },
  { label: 'Overcast',      emoji: '🌥️', color: '#8899b0' },
  { label: 'Cloudy',        emoji: '☁️',  color: '#99aabb' },
  { label: 'Partly Cloudy', emoji: '🌤️', color: '#70b0d0' },
  { label: 'Clearing Up',   emoji: '🌈',  color: '#80c080' },
  { label: 'Sunny',         emoji: '☀️',  color: '#f0c040' },
  { label: 'Beautiful',     emoji: '🌟',  color: '#f0a030' },
  { label: 'Perfect',       emoji: '✨',  color: '#ff80c0' },
];

const BUB_COLORS = [
  '#a080e0','#80aacc','#80b0cc','#99aac0','#aabbcc',
  '#80c8e0','#80d080','#f0c840','#f0a840','#ff88cc'
];

fetch('mood.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const level = Math.max(1, Math.min(10, data.level || 6));
    const s = STATES[level - 1];

    let bubsHTML = '';
    for (let i = 1; i <= 10; i++) {
      let cls = 'bub';
      let style = '';
      if (i <= level) {
        cls += ' filled';
        style = `--bc: ${BUB_COLORS[i-1]};`;
      }
      if (i === level) cls += ' current';
      bubsHTML += `<div class="${cls}" style="${style}"></div>`;
    }

    const noteHTML = data.note
      ? `<div class="note-label">💬 note</div><div class="note-text">${data.note}</div>`
      : `<div class="note-text" style="color:#ddaacc;">no note today! 🎀</div>`;

    document.getElementById('content').innerHTML = `
      <div class="sticker-row">⭐ 💖 ⭐ 💕 ⭐</div>
      <div class="feeling-pill">💗 azmyth is feeling...</div>
      <div class="emoji-bubble">${s.emoji}</div>
      <div class="condition-bubble">
        <span class="condition-text" style="--ccolor:${s.color}; background:${s.color};">${s.label}</span>
      </div>
      <div class="level-text">level ${level} / 10 💖</div>
      <div class="bubbles-scale">${bubsHTML}</div>
      <hr class="divider">
      <div class="note-pill">${noteHTML}</div>
      <div class="updated-pill">⭐ last updated: ${data.updated || '?'} ⭐</div>
    `;
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div class="fallback">💔 couldn\'t load the report!</div>';
  });
</script>
</body>
</html>
