<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wither Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Bangers', cursive;
    min-height: 100vh;
    background-color: #ffe44d;
    background-image: radial-gradient(circle, #333 1px, transparent 1px);
    background-size: 18px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #ffe44d;
    width: 100%;
    max-width: 460px;
    border: 4px solid #111;
    box-shadow: 8px 8px 0 #111;
    position: relative;
    overflow: visible;
  }

  .card-header {
    background: #e63030;
    border-bottom: 4px solid #111;
    padding: 14px 20px;
    text-align: center;
    position: relative;
  }

  .card-header h1 {
    font-size: 2.6rem;
    color: #ffe44d;
    letter-spacing: 4px;
    text-shadow:
      3px 3px 0 #111,
      -1px -1px 0 #111,
      1px -1px 0 #111,
      -1px 1px 0 #111;
    line-height: 1;
  }

  .speed-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.06) 30px,
      rgba(255,255,255,0.06) 32px
    );
    pointer-events: none;
  }

  .card-body {
    padding: 20px;
  }

  /* Speech bubble */
  .speech-bubble {
    background: white;
    border: 4px solid #111;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: #111;
    position: relative;
    margin-bottom: 24px;
    display: inline-block;
    width: 100%;
    text-align: center;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-top: 10px solid #111;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top: 8px solid white;
    z-index: 1;
  }

  .emoji-panel {
    background: #1a6fcc;
    border: 4px solid #111;
    margin: 20px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    box-shadow: 4px 4px 0 #111;
    position: relative;
    overflow: hidden;
  }

  .emoji-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04),
      rgba(255,255,255,0.04) 5px,
      transparent 5px,
      transparent 20px
    );
  }

  .main-emoji {
    font-size: 7rem;
    filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.4));
    position: relative;
    z-index: 1;
  }

  .pow-panel {
    text-align: center;
    padding: 12px 10px 8px;
  }

  .condition-text {
    font-size: 3.4rem;
    letter-spacing: 3px;
    color: #111;
    text-shadow:
      4px 4px 0 rgba(0,0,0,0.2);
    display: inline-block;
    padding: 4px 16px;
    border: 4px solid #111;
    box-shadow: 4px 4px 0 #111;
    background: white;
    transform: rotate(-1deg);
    display: inline-block;
  }

  .level-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 1.4rem;
    color: #111;
    margin: 14px 0 6px;
    letter-spacing: 1px;
  }

  .scale-section {
    margin-bottom: 16px;
  }

  .scale-bars {
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 40px;
    padding: 0 4px;
    margin-top: 8px;
  }

  .bar {
    flex: 1;
    border: 3px solid #111;
    background: #ddd;
    box-shadow: 2px 2px 0 #111;
    height: 30px;
  }

  .bar.filled { background: var(--bc, #e63030); }
  .bar.current { border-color: #111; box-shadow: 3px 3px 0 #111; height: 40px; }

  .divider-comic {
    border: none;
    border-top: 4px solid #111;
    margin: 14px 0;
    position: relative;
  }

  .divider-comic::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffe44d;
    padding: 0 8px;
    font-size: 1rem;
    color: #111;
  }

  .note-box {
    background: white;
    border: 4px solid #111;
    padding: 10px 14px;
    margin-bottom: 14px;
    box-shadow: 4px 4px 0 #111;
    min-height: 52px;
  }

  .note-label {
    font-size: 1.1rem;
    color: #e63030;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .note-text {
    font-size: 1.3rem;
    color: #333;
  }

  .updated-box {
    background: #111;
    color: #ffe44d;
    padding: 8px 16px;
    font-size: 1.2rem;
    letter-spacing: 2px;
    text-align: right;
  }

  .bang {
    display: inline-block;
    background: #e63030;
    color: white;
    font-size: 1rem;
    padding: 1px 6px;
    border: 2px solid #111;
    margin-right: 4px;
    transform: rotate(-3deg);
    display: inline-block;
    box-shadow: 2px 2px 0 #111;
  }

  .fallback {
    text-align: center;
    font-size: 1.8rem;
    color: #111;
    padding: 30px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="speed-lines"></div>
    <h1>THE WITHER REPORT!</h1>
  </div>
  <div class="card-body">
    <div id="content">
      <div class="fallback">LOADING...</div>
    </div>
  </div>
</div>

<script>
const STATES = [
  { label: 'Stormy',        emoji: '⛈️',  color: '#6060a0' },
  { label: 'Heavy Rain',    emoji: '🌧️', color: '#5a80a0' },
  { label: 'Rainy',         emoji: '🌦️', color: '#6090b0' },
  { label: 'Overcast',      emoji: '🌥️', color: '#8899b0' },
  { label: 'Cloudy',        emoji: '☁️',  color: '#99aabb' },
  { label: 'Partly Cloudy', emoji: '🌤️', color: '#70b0d0' },
  { label: 'Clearing Up',   emoji: '🌈',  color: '#80c080' },
  { label: 'Sunny',         emoji: '☀️',  color: '#f0c040' },
  { label: 'Beautiful',     emoji: '🌟',  color: '#f0a030' },
  { label: 'Perfect',       emoji: '✨',  color: '#ff80c0' },
];

const BAR_COLORS = [
  '#6060a0','#5a80a0','#6090b0','#8899b0','#99aabb',
  '#70b0d0','#80c080','#f0c040','#f0a030','#ff80c0'
];

fetch('mood.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const level = Math.max(1, Math.min(10, data.level || 6));
    const s = STATES[level - 1];

    let barsHTML = '';
    for (let i = 1; i <= 10; i++) {
      let cls = 'bar';
      let style = '';
      if (i <= level) { cls += ' filled'; style = `--bc: ${BAR_COLORS[i-1]};`; }
      if (i === level) cls += ' current';
      barsHTML += `<div class="${cls}" style="${style}"></div>`;
    }

    const noteHTML = data.note
      ? `<div class="note-label">NOTE:</div><div class="note-text">${data.note}</div>`
      : `<div class="note-text" style="color:#bbb;">— no note —</div>`;

    document.getElementById('content').innerHTML = `
      <div class="speech-bubble">AZMYTH IS FEELING:</div>
      <div class="emoji-panel">
        <span class="main-emoji">${s.emoji}</span>
      </div>
      <div class="pow-panel">
        <div class="condition-text" style="color:${s.color}; border-color:#111;">${s.label.toUpperCase()}!</div>
      </div>
      <div class="level-row"><span class="bang">LEVEL</span> ${level} / 10</div>
      <div class="scale-section">
        <div class="scale-bars">${barsHTML}</div>
      </div>
      <div class="divider-comic"></div>
      <div class="note-box">${noteHTML}</div>
      <div class="updated-box">LAST UPDATE: ${(data.updated || '?').toUpperCase()}</div>
    `;
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div class="fallback">KA-BOOM!<br>COULDN\'T LOAD!</div>';
  });
</script>
</body>
</html>
