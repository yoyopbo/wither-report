<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wither Report — Chalkboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Patrick Hand', 'Caveat', cursive;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      /* Dark wood frame / classroom wall */
      background: #1a1209;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.012) 40px,
          rgba(255,255,255,0.012) 41px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.012) 40px,
          rgba(255,255,255,0.012) 41px
        );
      position: relative;
    }

    /* Wooden tray strip at bottom of board */
    .chalk-tray {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: linear-gradient(180deg, #5c3d1a 0%, #3d2710 100%);
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .chalk-stub {
      width: 36px;
      height: 10px;
      border-radius: 4px;
      opacity: 0.7;
    }

    /* Board frame */
    .board-frame {
      position: relative;
      max-width: 560px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(145deg, #4a2c0a, #2e1a08);
      border-radius: 6px;
      box-shadow:
        0 0 0 3px #6b3f12,
        0 0 0 6px #3d2208,
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 2px 4px rgba(255,200,100,0.1);
    }

    /* Board surface */
    .board {
      background: #2d5a27;
      border-radius: 3px;
      padding: 2.5rem 2rem 2rem;
      position: relative;
      overflow: hidden;

      /* Chalk texture via layered radial gradients */
      background-image:
        radial-gradient(ellipse 180% 180% at 30% 30%, rgba(255,255,255,0.018) 0%, transparent 60%),
        radial-gradient(ellipse 120% 100% at 75% 70%, rgba(255,255,255,0.012) 0%, transparent 55%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.008) 0%, transparent 40%),
        repeating-radial-gradient(
          circle at 50% 50%,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.004) 3px,
          rgba(255,255,255,0.004) 4px
        );
    }

    /* Chalk dust streaks */
    .board::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          172deg,
          transparent 0px,
          transparent 8px,
          rgba(255,255,255,0.008) 8px,
          rgba(255,255,255,0.008) 9px
        );
      pointer-events: none;
    }

    /* Chalk border around board */
    .board::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 2.5px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      pointer-events: none;
    }

    .board > * { position: relative; z-index: 2; }

    /* Header */
    .board-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .board-title {
      font-family: 'Caveat', cursive;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff9c4;
      text-shadow:
        1px 1px 0 rgba(255,255,255,0.1),
        2px 2px 8px rgba(0,0,0,0.3);
      letter-spacing: 0.03em;
      line-height: 1.2;
      /* Slightly uneven look */
      transform: rotate(-0.8deg);
      display: inline-block;
    }

    .board-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      margin-top: 0.4rem;
      letter-spacing: 0.06em;
    }

    /* Chalk underline */
    .chalk-underline {
      width: 70%;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.45) 15%,
        rgba(255,255,255,0.55) 50%,
        rgba(255,255,255,0.4) 85%,
        transparent 100%
      );
      margin: 0.6rem auto 0;
      border-radius: 2px;
      position: relative;
    }

    /* Small chalk stars on header */
    .chalk-stars {
      font-size: 0.85rem;
      color: rgba(255, 240, 100, 0.6);
      letter-spacing: 1rem;
      display: block;
      text-align: center;
      margin-bottom: 1.6rem;
    }

    /* Date corner stamp */
    .date-corner {
      position: absolute;
      top: 18px;
      right: 24px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
      transform: rotate(1.5deg);
      text-align: right;
      line-height: 1.5;
      z-index: 3;
    }

    /* Main content area */
    .content-row {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    /* Emoji circle */
    .emoji-circle {
      flex-shrink: 0;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      position: relative;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    }

    /* Chalk circle effect — hand-drawn look with irregular dashing */
    .emoji-circle::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.25);
    }

    .emoji-circle::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px dotted rgba(255,255,255,0.12);
    }

    /* Right side text */
    .text-side {
      flex: 1;
      text-align: left;
    }

    .feeling-question {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: #ffb3cc;
      margin-bottom: 0.3rem;
      transform: rotate(-0.5deg);
      display: inline-block;
    }

    .condition-name {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow:
        1px 1px 3px rgba(0,0,0,0.3),
        0 0 20px rgba(255,255,255,0.15);
      line-height: 1.1;
      margin-bottom: 0.5rem;
      display: inline-block;
      transform: rotate(-1deg);
    }

    .chalk-arrow {
      color: #fff9c4;
      font-size: 1.1rem;
      display: block;
    }

    /* Scale section */
    .scale-section {
      margin-bottom: 1.8rem;
    }

    .scale-label {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.7rem;
      letter-spacing: 0.06em;
    }

    /* Progress bar chalk style */
    .chalk-bar-wrap {
      position: relative;
      height: 18px;
      background: rgba(0,0,0,0.25);
      border-radius: 3px;
      border: 1.5px solid rgba(255,255,255,0.2);
      margin-bottom: 0.7rem;
      overflow: hidden;
    }

    .chalk-bar-fill {
      position: absolute;
      top: 2px;
      left: 2px;
      bottom: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.65) 60%,
        rgba(255,255,255,0.4) 100%
      );
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      /* Chalk texture on the bar */
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 6px,
          rgba(0,0,0,0.06) 6px,
          rgba(0,0,0,0.06) 7px
        );
    }

    /* Tally marks */
    .tally-row {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
    }

    .tally-group {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-right: 6px;
    }

    .tally-mark {
      font-size: 1.2rem;
      font-family: 'Caveat', cursive;
      line-height: 1;
      transition: color 0.4s ease;
    }

    .tally-mark.filled    { color: rgba(255,255,255,0.8); }
    .tally-mark.empty     { color: rgba(255,255,255,0.18); }
    /* 5th mark is diagonal slash */
    .tally-mark.slash     { transform: rotate(-20deg); display: inline-block; }

    /* Divider */
    .chalk-divider {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 4px;
      text-align: center;
      margin: 1.2rem 0;
    }

    /* Note area */
    .note-section {
      background: rgba(0,0,0,0.15);
      border-left: 3px solid rgba(255, 200, 100, 0.4);
      padding: 0.8rem 1rem;
      border-radius: 0 4px 4px 0;
      margin-bottom: 1.5rem;
      min-height: 2.5rem;
    }

    .note-label {
      font-size: 0.72rem;
      color: rgba(255, 200, 100, 0.6);
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }

    .note-text {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.55;
      font-style: italic;
    }

    /* Footer row */
    .board-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-doodles {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 4px;
    }

    .updated-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-align: right;
      line-height: 1.5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .content-row {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .text-side { text-align: center; }
      .board-footer { flex-direction: column; align-items: center; gap: 8px; }
      .updated-text { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Chalk tray -->
  <div class="chalk-tray">
    <div class="chalk-stub" style="background:#fff9d6; width:44px;"></div>
    <div class="chalk-stub" style="background:#ffb3cc; width:32px;"></div>
    <div class="chalk-stub" style="background:#b3d9ff; width:50px;"></div>
    <div class="chalk-stub" style="background:#fff9d6; width:28px;"></div>
    <div class="chalk-stub" style="background:#c8f0c0; width:38px;"></div>
  </div>

  <div class="board-frame">
    <div class="board">

      <!-- Date in corner -->
      <div class="date-corner" id="dateCorner">
        <div style="color:rgba(255,200,100,0.5)">☆ daily report</div>
        <div id="dateText">loading...</div>
      </div>

      <!-- Header -->
      <div class="board-header">
        <div class="board-title">How's Azmyth doing?</div>
        <div class="chalk-underline"></div>
        <div class="board-subtitle">~ the wither report ~</div>
      </div>

      <div class="chalk-stars">★ ✦ ★</div>

      <!-- Main content -->
      <div class="content-row">
        <div class="emoji-circle" id="mainEmoji">⛈️</div>
        <div class="text-side">
          <div class="feeling-question">feeling like...</div>
          <div class="condition-name" id="conditionName">Loading</div>
          <span class="chalk-arrow">← today's mood ✓</span>
        </div>
      </div>

      <!-- Scale -->
      <div class="scale-section">
        <div class="scale-label">mood level: <span id="levelNum">?</span> / 10</div>
        <div class="chalk-bar-wrap">
          <div class="chalk-bar-fill" id="barFill" style="width:0%"></div>
        </div>
        <div class="tally-row" id="tallyRow"></div>
      </div>

      <div class="chalk-divider">- - - - - - - - - - - - - - -</div>

      <!-- Note -->
      <div class="note-section" id="noteSection" style="display:none">
        <div class="note-label">✎ note:</div>
        <div class="note-text" id="noteText"></div>
      </div>

      <!-- Footer -->
      <div class="board-footer">
        <div class="footer-doodles">⭐ ✦ ☆ ✩ ⭐</div>
        <div class="updated-text" id="updatedText">updated: loading...</div>
      </div>

    </div>
  </div>

  <script>
    const STATES = [
      { label: 'Stormy',        emoji: '⛈️'  },
      { label: 'Heavy Rain',    emoji: '🌧️'  },
      { label: 'Rainy',         emoji: '🌦️'  },
      { label: 'Overcast',      emoji: '🌥️'  },
      { label: 'Cloudy',        emoji: '☁️'  },
      { label: 'Partly Cloudy', emoji: '🌤️'  },
      { label: 'Clearing Up',   emoji: '🌈'   },
      { label: 'Sunny',         emoji: '☀️'  },
      { label: 'Beautiful',     emoji: '🌟'   },
      { label: 'Perfect',       emoji: '✨'   },
    ];

    // Build tally marks (groups of 5)
    const tallyRow = document.getElementById('tallyRow');
    const tallies  = [];
    for (let g = 0; g < 2; g++) {
      const group = document.createElement('div');
      group.className = 'tally-group';
      for (let t = 0; t < 5; t++) {
        const mark = document.createElement('span');
        const idx  = g * 5 + t;
        // 5th mark in each group is the slash
        mark.className = 'tally-mark empty' + (t === 4 ? ' slash' : '');
        mark.textContent = t === 4 ? '/' : '|';
        mark.id = 'tally-' + idx;
        group.appendChild(mark);
        tallies.push(mark);
      }
      tallyRow.appendChild(group);
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    function shortDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    fetch('mood.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const level = Math.max(1, Math.min(10, data.level || 6));
        const s = STATES[level - 1];

        document.getElementById('mainEmoji').textContent     = s.emoji;
        document.getElementById('conditionName').textContent = s.label;
        document.getElementById('levelNum').textContent      = level;

        // Progress bar
        document.getElementById('barFill').style.width = (level * 10) + '%';

        // Tally marks
        for (let i = 0; i < 10; i++) {
          const m = document.getElementById('tally-' + i);
          if (i < level) {
            m.className = m.className.replace('empty', 'filled');
          }
        }

        // Note
        if (data.note) {
          document.getElementById('noteSection').style.display = '';
          document.getElementById('noteText').textContent = data.note;
        }

        // Date corner
        if (data.updated) {
          document.getElementById('dateText').textContent = shortDate(data.updated);
        }

        // Updated footer
        const upd = document.getElementById('updatedText');
        upd.textContent = data.updated
          ? 'updated: ' + formatDate(data.updated)
          : '';
      })
      .catch(() => {
        document.getElementById('conditionName').textContent = '???';
        document.getElementById('updatedText').textContent   = 'could not load data';
      });
  </script>
</body>
</html>
