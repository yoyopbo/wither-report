<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wither Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #07090e;
      --card:   #0d1520;
      --amber:  #f0b42a;
      --text:   #e4ecf5;
      --muted:  #637080;
      --red:    #e63946;
      --border: rgba(240,180,42,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .live-dot {
      background: var(--red);
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      padding: 3px 7px 2px;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .show-title {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--amber);
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), #f9d96a, var(--amber));
    }

    /* ── Graphic ── */
    .graphic-area {
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0 8px;
    }

    /* ── Text ── */
    .label-small {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .condition {
      font-family: 'Oswald', sans-serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
      padding: 0 32px;
      line-height: 1.1;
    }

    /* ── Scale ── */
    .scale-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 20px 32px 0;
    }
    .pip {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.5s;
    }
    .pip.on { background: var(--amber); }

    /* ── Note ── */
    .note-text {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 40px;
      margin-top: 14px;
    }
    .updated-text {
      text-align: center;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      opacity: 0.4;
      text-transform: uppercase;
      margin-top: 8px;
      padding-bottom: 20px;
    }

    /* ── Ticker ── */
    .ticker {
      background: var(--amber);
      height: 30px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .ticker-tag {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #07090e;
      padding: 0 14px;
      border-right: 2px solid rgba(0,0,0,0.2);
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-scroll { overflow: hidden; flex: 1; }
    .ticker-inner {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: #07090e;
      animation: scroll 24s linear infinite;
    }
    @keyframes scroll { from{transform:translateX(100%)} to{transform:translateX(-100%)} }

    /* ── SVG animations ── */
    @keyframes spin    { from{transform:rotate(0)}   to{transform:rotate(360deg)} }
    @keyframes drift   { 0%,100%{transform:translateX(0)} 50%{transform:translateX(7px)} }
    @keyframes drift-r { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-6px)} }
    @keyframes rain    { 0%{transform:translateY(-8px);opacity:0} 15%{opacity:1} 100%{transform:translateY(52px);opacity:0} }
    @keyframes flash   { 0%,84%,100%{opacity:0} 85%,89%{opacity:1} 90%,94%{opacity:0} 95%,99%{opacity:0.8} }
    @keyframes glow    { 0%,100%{opacity:.15} 50%{opacity:.28} }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="live-dot">LIVE</span>
    <span class="show-title">The Wither Report</span>
  </div>

  <div class="card">
    <div class="graphic-area" id="graphic"></div>
    <div class="label-small">Azmyth is feeling</div>
    <div class="condition" id="condition">—</div>
    <div class="scale-row" id="scale"></div>
    <div class="note-text" id="note"></div>
    <div class="updated-text" id="updated"></div>
    <div class="ticker">
      <div class="ticker-tag">WITHER</div>
      <div class="ticker-scroll"><span class="ticker-inner" id="ticker">· · ·</span></div>
    </div>
  </div>

  <script>
    const LEVELS = [
      {

            <rect x="95"  y="95" width="2" height="11" rx="1" style="animation:rain 1.1s linear infinite;animation-delay:.32s"/>

            <rect x="34"  y="102" width="2" height="11" rx="1" style="animation:rain 1.1s linear infinite;animation-delay:.6s"/>
          </g>
        </svg>`
      },
      {
        label: 'Rainy',
        color: '#7a9ab8',
        ticker: 'RAIN ADVISORY · BRING AN UMBRELLA · GREY SKIES EXPECTED THROUGHOUT · ',

          <g style="animation:drift 4.5s ease-in-out infinite">

            <rect x="76" y="94" width="2" height="13" rx="1" style="animation:rain 1s linear infinite;animation-delay:.42s"/>
            <rect x="90" y="98" width="2" height="13" rx="1" style="animation:rain 1s linear infinite;animation-delay:.12s"/>
            <rect x="104" y="95" width="2" height="13" rx="1" style="animation:rain 1s linear infinite;animation-delay:.35s"/>
          </g>

      },
      {
        label: 'Overcast',
        color: '#8899b0',

          </g>
          <g style="animation:drift 5s ease-in-out infinite">
            <ellipse cx="70" cy="72" rx="48" ry="28" fill="#99aabb"/>
            <ellipse cx="47" cy="66" rx="27" ry="21" fill="#99aabb"/>
            <ellipse cx="92" cy="69" rx="24" ry="19" fill="#99aabb"/>
            <ellipse cx="70" cy="58" rx="31" ry="20" fill="#aabbc8"/>
          </g>
        </svg>`
      },
      {
        label: 'Partly Cloudy',
        color: '#c8d8e8',
        ticker: 'PARTIAL SUNSHINE · MILD CONDITIONS · CLOUDS MIXING WITH BREAKS OF SUN · ',
        svg: `<svg width="150" height="140" viewBox="0 0 150 140">
          <circle cx="58" cy="66" r="26" fill="#f0c040" opacity="0.9"/>
          <g style="transform-origin:58px 66px;animation:spin 14s linear infinite">
            <line x1="58" y1="30" x2="58" y2="20" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
            <line x1="58" y1="102" x2="58" y2="112" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
            <line x1="22" y1="66" x2="12" y2="66" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
            <line x1="94" y1="66" x2="104" y2="66" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
            <line x1="33" y1="41" x2="26" y2="34" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
            <line x1="83" y1="91" x2="90" y2="98" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>

            <line x1="33" y1="91" x2="26" y2="98" stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
          </g>
          <g style="animation:drift 5s ease-in-out infinite">
            <ellipse cx="96" cy="80" rx="40" ry="24" fill="#c8d8ea"/>
            <ellipse cx="74" cy="75" rx="24" ry="19" fill="#c8d8ea"/>
            <ellipse cx="118" cy="77" rx="21" ry="16" fill="#c8d8ea"/>
            <ellipse cx="96" cy="66" rx="28" ry="18" fill="#d8e8f2"/>
          </g>
        </svg>`
      },
      {
        label: 'Mostly Sunny',
        color: '#f0c840',
        ticker: 'MOSTLY SUNNY · PLEASANT CONDITIONS · HIGH PRESSURE HOLDING · GREAT DAY AHEAD · ',
        svg: `<svg width="150" height="140" viewBox="0 0 150 140">
          <circle cx="72" cy="66" r="34" fill="#f0c040" opacity="0.15" style="animation:glow 3s ease-in-out infinite"/>
          <circle cx="72" cy="66" r="26" fill="#f5c840"/>
          <g style="transform-origin:72px 66px;animation:spin 10s linear infinite">
            <line x1="72" y1="28" x2="72" y2="16" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="72" y1="104" x2="72" y2="116" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="34" y1="66" x2="22" y2="66" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="110" y1="66" x2="122" y2="66" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="45" y1="37" x2="37" y2="29" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="99" y1="95" x2="107" y2="103" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="99" y1="37" x2="107" y2="29" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="45" y1="95" x2="37" y2="103" stroke="#f5c840" stroke-width="3.5" stroke-linecap="round"/>
          </g>
          <g style="animation:drift 7s ease-in-out infinite" opacity="0.8">
            <ellipse cx="112" cy="90" rx="28" ry="17" fill="#c8d8ea"/>
            <ellipse cx="92"  cy="87" rx="18" ry="14" fill="#c8d8ea"/>
          </g>
        </svg>`
      },
      {
        label: 'Clear Skies',
        color: '#f9d840',
        ticker: 'CLEAR SKIES AHEAD · PERFECT CONDITIONS · FULL SUNSHINE ALL DAY · PEAK VISIBILITY · ',
        svg: `<svg width="150" height="140" viewBox="0 0 150 140">
          <circle cx="75" cy="68" r="56" fill="#f5c030" opacity="0.08" style="animation:glow 3s ease-in-out infinite"/>
          <circle cx="75" cy="68" r="40" fill="#f5c030" opacity="0.13" style="animation:glow 3s ease-in-out infinite;animation-delay:.5s"/>
          <circle cx="75" cy="68" r="27" fill="#f9d040"/>
          <g style="transform-origin:75px 68px;animation:spin 8s linear infinite">
            <line x1="75" y1="28" x2="75" y2="14" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="75" y1="108" x2="75" y2="122" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="35" y1="68" x2="21" y2="68" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="115" y1="68" x2="129" y2="68" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="47" y1="40" x2="37" y2="30" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="103" y1="96" x2="113" y2="106" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="103" y1="40" x2="113" y2="30" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
            <line x1="47" y1="96" x2="37" y2="106" stroke="#f9d040" stroke-width="4" stroke-linecap="round"/>
          </g>
        </svg>`
      },
    ];

    fetch('mood.json?v=' + Date.now())
      .then(r => r.json())
      .then(render)
      .catch(() => render({ level: 4, note: '', updated: '' }));

    function render(data) {
      const level = Math.max(1, Math.min(6, data.level || 4));
      const w = LEVELS[level - 1];

      document.getElementById('graphic').innerHTML = w.svg;
      document.getElementById('condition').textContent = w.label;
      document.getElementById('condition').style.color = w.color;
      document.getElementById('ticker').textContent = (w.ticker + w.ticker);

      const scale = document.getElementById('scale');
      scale.innerHTML = LEVELS.map((_, i) =>
        `<div class="pip${i < level ? ' on' : ''}"></div>`
      ).join('');

      const note = document.getElementById('note');
      note.textContent = data.note ? `"${data.note}"` : '';
      note.style.display = data.note ? '' : 'none';

      const upd = document.getElementById('updated');
      upd.textContent = data.updated ? `LAST UPDATED  ${data.updated.toUpperCase()}` : '';
    }
  </script>
</body>
</html>
